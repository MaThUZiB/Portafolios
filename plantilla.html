<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CV</title>
    <link rel="stylesheet" href="CSS/plantilla.css">
</head>

<body>

<div class="cv" id="cv-content">

    <!-- HEADER -->
    <header class="header">

        <div class="profile">
            <img src="{{profileImage}}" alt="Perfil">
            <h1>{{name}}</h1>
            <p class="titles">
                {{titles}}
            </p>
        </div>

        <div class="contact-section">
            <h3>Contacto</h3>
            <ul>
                {{contact}}
            </ul>
        </div>

    </header>

    <!-- ABOUT -->
    <section class="section">
        <h2>Acerca de mí</h2>
        <div class="about">
            {{about}}
        </div>
    </section>

    <!-- EDUCATION + EXPERIENCE -->
    <section class="section two-columns">

        <div>
            <h2>Educación</h2>
            {{education}}
        </div>

        <div>
            <h2>Experiencia</h2>
            {{experience}}
        </div>

    </section>

    <!-- PROJECTS -->
    <section class="section">
        <h2>Proyectos</h2>
        <div class="projects-grid">
            {{projects}}
        </div>
    </section>

    <!-- CERTIFICATIONS -->
<section class="section">
    <h2>Certificaciones</h2>

    <ul class="cert-grid">
        {{certifications}}
    </ul>
</section>

    <!-- FOOTER -->
    <div class="cv-footer">
        <span>{{name}} • CV</span>
        <span>ivanmatus204@gmail.com | +56 9 9945 5574</span>
        <span>Generado desde mi portafolio web</span>
    </div>

</div>

</body>
</html>
